[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [
    ".venv",
    "build",
    "dist",
    "tmp",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "B",
    "UP",
    "SIM",
]
ignore = [
    "E501",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Ruff lint
        run: python -m ruff check . --no-cache

      - name: Ruff format check
        run: python -m ruff format . --check

      - name: Type check
        run: python -m pyright

      - name: Tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest

      - name: Coverage
        env:
          QT_QPA_PLATFORM: offscreen
          COVERAGE_FILE: tmp/.coverage
        run: python -m pytest --cov=omnidesk --cov-report=term-missing --cov-report=xml:tmp\coverage.xml

      - name: PyInstaller smoke build
        run: pyinstaller --clean --noconfirm --workpath tmp\pyinstaller-build --distpath dist OmniDesk.spec

      - name: Verify executable
        run: |
          if (!(Test-Path "dist\OmniDesk.exe")) {
            throw "dist\OmniDesk.exe was not created"
          }
